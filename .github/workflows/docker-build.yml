name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/chatapp-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/chatapp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/chatapp-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/chatapp-frontend:${{ github.sha }}
          build-args: |
            API_BASE_URL=${{ vars.API_BASE_URL }}
            SOCKET_URL=${{ vars.SOCKET_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update K8s manifests with new image tags
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_HUB_USERNAME }}/chatapp-backend:.*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/chatapp-backend:${{ github.sha }}|" k8s/backend.yml
          sed -i "s|image: ${{ secrets.DOCKER_HUB_USERNAME }}/chatapp-frontend:.*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/chatapp-frontend:${{ github.sha }}|" k8s/frontend.yml

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "[skip ci] Update image tags to ${{ github.sha }}"
          git push