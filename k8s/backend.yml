apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatapp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatapp-backend
  template:
    metadata:
      labels:
        app: chatapp-backend
    spec:
      containers:
        - name: backend
          image: lethanhlong/chatapp-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: chatapp-db
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: chatapp
            - name: DB_PASSWORD
              value: chatapp
            - name: DB_NAME
              value: chatapp
            - name: JWT_SECRET
              value: demo_secret
---
apiVersion: v1
kind: Service
metadata:
  name: chatapp-backend
spec:
  selector:
    app: chatapp-backend
  ports:
    - port: 3001
      targetPort: 3001